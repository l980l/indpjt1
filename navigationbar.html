        </div>
        <div class="text-[9px] font-orbitron font-semibold text-brass mt-0.5 tracking-wider">

      </div>

    </div>

  </div>
</header>

<!-- [공통 자바스크립트 엔진 - 헤더 작동 및 활성화 자동 처리] -->
<script>
  // 1. 공용 테마 토글 스위치
  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    if (isDark) {
      document.body.classList.remove('html-light');
      localStorage.setItem('themeMode', 'dark');
    } else {
      document.body.classList.add('html-light');
      localStorage.setItem('themeMode', 'light');
    }
  }

  // 2. 모바일 반응형 햄버거 메뉴 토글
  function toggleMobileMenu() {
    const nav = document.getElementById('navLinks');
    const hud = document.getElementById('hudControls');
    if (nav) nav.classList.toggle('hidden');
    if (hud) hud.classList.toggle('hidden');
  }

  // 3. 현재 방문 중인 페이지 감지하여 황동색 활성화 언더라인 수여 로직
  function highlightCurrentPage() {
    const items = document.querySelectorAll('.nav-item');
    const path = window.location.pathname;
    let pageName = path.split("/").pop() || 'intro.html';
    
    // 파일명 없이 최상위 도메인(/)으로 진입했거나 index.html일 경우 intro.html로 자동 보정 매핑
    if (pageName === '' || pageName === 'index.html') {
      pageName = 'intro.html';
    }

    items.forEach(item => {
      const href = item.getAttribute('href');
      if (pageName === href) {
        // 활성화 스타일 적용 (황동색 빛나는 효과)
        item.className = "nav-item text-brass font-bold border-b-2 border-brass py-1 relative group transition-all glow-brass";
        const line = item.querySelector('span');
        if (line) line.className = "hidden"; // 기본 호버 라인은 숨김
      } else {
        // 비활성화 기본 스타일 적용
        item.className = "nav-item text-slate-500 dark:text-slate-400 hover:text-neonBlue py-1 relative group transition-all";
        const line = item.querySelector('span');
        if (line) line.className = "absolute bottom-0 left-0 w-0 h-0.5 bg-neonBlue transition-all group-hover:w-full";
      }
    });
  }

  // 문서 로드 완료 시 스마트 하이라이트 즉각 실행
  document.addEventListener('DOMContentLoaded', highlightCurrentPage);
</script>
