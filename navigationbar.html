<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I AM : 가상 세계 아카이브 - 네비게이션 HUD</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Orbitron & Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cyberDark: '#0B0E14',
            cyberNavy: '#161C24',
            cyberCard: '#1E2633',
            neonBlue: '#4A90E2',
            neonBlueGlow: '#2171CD',
            brass: '#CD7F32',
            brassGlow: '#A05A15',
          },
          fontFamily: {
            orbitron: ['Orbitron', 'sans-serif'],
            sans: ['Noto Sans KR', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #0B0E14;
      color: #E2E8F0;
      transition: background-color 0.3s, color 0.3s;
    }
    /* 홀로그램 글래스모피즘 테두리 */
    .glass-panel {
      background: rgba(30, 38, 51, 0.45);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(74, 144, 226, 0.2);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      transition: background-color 0.3s, border-color 0.3s;
    }
    /* 라이트 모드 전환 시 투명도 및 테두리 정비 */
    .html-light .glass-panel {
      background: rgba(241, 245, 249, 0.85);
      border-bottom: 1px solid rgba(74, 144, 226, 0.3);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    .html-light {
      background-color: #F8FAFC;
      color: #0F172A;
    }
    /* 빛나는 효과 지정 */
    .glow-blue {
      text-shadow: 0 0 8px rgba(74, 144, 226, 0.5);
    }
    .glow-brass {
      text-shadow: 0 0 8px rgba(205, 127, 50, 0.5);
    }
  </style>
</head>
<body class="font-sans antialiased dark">

  <!-- [ 복사용 공통 HEADER 영역 시작 ] -->
  <header class="sticky top-0 z-50 w-full glass-panel px-4 py-3 md:px-8 text-slate-800 dark:text-slate-100">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      
      <!-- 좌측 로고 구역 -->
      <div class="flex items-center justify-between w-full md:w-auto">
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 bg-neonBlue animate-ping rounded-full"></div>
          <a href="index.html" class="font-orbitron text-2xl font-black tracking-wider flex items-baseline gap-2 group hover:opacity-90">
            I AM <span class="text-xs text-brass font-sans tracking-normal opacity-80 group-hover:text-neonBlue transition-colors">[가상 세계 아카이브]</span>
          </a>
        </div>
        
        <!-- 모바일 햄버거 토글 버튼 -->
        <button id="mobileMenuBtn" onclick="toggleMobileMenu()" class="p-2 border border-slate-700 rounded md:hidden hover:bg-slate-800/30">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>

      <!-- 중앙 라우터 링크 (경로 기준 활성화 클래스 부여) -->
      <nav id="navLinks" class="hidden md:flex flex-col md:flex-row items-center gap-y-2 gap-x-6 text-xs md:text-sm font-semibold tracking-wider font-orbitron uppercase w-full md:w-auto">
        <a href="index.html" class="nav-item text-slate-500 dark:text-slate-400 hover:text-neonBlue py-1 relative group transition-colors">
          01 // HOME
          <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-neonBlue transition-all group-hover:w-full"></span>
        </a>
        <a href="archive.html" class="nav-item text-slate-500 dark:text-slate-400 hover:text-neonBlue py-1 relative group transition-colors">
          02 // ARCHIVE MAP
          <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-neonBlue transition-all group-hover:w-full"></span>
        </a>
        <a href="network.html" class="nav-item text-slate-500 dark:text-slate-400 hover:text-neonBlue py-1 relative group transition-colors">
          03 // CO-OP NETWORK
          <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-neonBlue transition-all group-hover:w-full"></span>
        </a>
      </nav>

      <!-- 우측 HUD 컨트롤 센터 -->
      <div id="hudControls" class="hidden md:flex items-center gap-4 w-full md:w-auto justify-end border-t border-slate-800/30 md:border-none pt-3 md:pt-0">
        
        <!-- 오디오 재생 컨트롤 -->
        <button id="soundToggle" onclick="toggleSound()" class="p-2 border border-brass/40 rounded bg-cyberDark dark:bg-transparent hover:bg-brass hover:text-black transition-all flex items-center gap-1.5 text-xs text-brass" title="Web Audio 음향 재생 설정">
          <svg id="soundIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 fill-current" viewBox="0 0 24 24">
            <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.5C3.12 7.5 2 8.62 2 10v4c0 1.38 1.12 2.5 2.5 2.5h1.94l4.5 4.5c.944.945 2.56.276 2.56-1.06V4.06z"/>
            <path class="wave-lines" d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM16 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
          <span id="soundText" class="font-orbitron font-bold">MUTED</span>
        </button>

        <!-- 다국어 토글 버튼 -->
        <button onclick="toggleLang()" class="px-2.5 py-1.5 border border-slate-400 dark:border-slate-700 text-slate-800 dark:text-slate-300 rounded font-bold font-orbitron text-xs hover:bg-neonBlue hover:text-white transition-all">
          <span id="langBtnText">EN</span>
        </button>

        <!-- 테마 전환 (다크/라이트) 토글 버튼 -->
        <button onclick="toggleTheme()" class="p-2 border border-brass/40 rounded bg-cyberDark dark:bg-transparent text-brass hover:bg-brass hover:text-black transition-all" title="테마 전환">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path id="themeIcon" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-.39-1.03 0-1.41s1.03-.39 1.41 0l1.06 1.06c.39.39.39 1.03 0 1.41s-1.03.39-1.41 0l-1.06-1.06zM5.99 18.01l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z"/>
          </svg>
        </button>

        <!-- 아카이브 마스터 동조율 게이지 -->
        <div class="flex flex-col items-end w-32 md:w-40">
          <div class="flex justify-between w-full text-[10px] font-bold font-orbitron text-slate-500 dark:text-slate-400">
            <span>SYNC RATE</span>
            <span id="syncProgressText" class="text-neonBlue font-black">0%</span>
          </div>
          <div class="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden mt-1 border border-slate-300 dark:border-slate-700">
            <div id="syncProgressBar" class="bg-gradient-to-r from-neonBlue to-brass h-full transition-all duration-700" style="width: 0%"></div>
          </div>
          <div class="text-[9px] font-orbitron font-semibold text-brass mt-0.5 tracking-wider">
            SYSTEM RANK: <span id="systemRank" class="text-slate-800 dark:text-white font-bold">E</span>
          </div>
        </div>

      </div>

    </div>
  </header>
  <!-- [ 복사용 공통 HEADER 영역 끝 ] -->

  <!-- 프리뷰 전용 바디 데모 컨텍스트 -->
  <main class="max-w-4xl mx-auto py-16 px-4 text-center relative z-10">
    <div class="p-8 border border-slate-800 rounded bg-cyberNavy/40">
      <h2 class="text-xl font-bold font-orbitron text-brass mb-3">NAVBAR COMPONENT DEMO PREVIEW</h2>
      <p class="text-sm text-slate-400 leading-relaxed mb-6">
        상단 영역은 다른 모든 개별 파일(index.html, archive.html 등)에 동일하게 복사하여 삽입하는 통합 네비게이션 모듈입니다. <br>
        로컬에서 테스트 시 현재 열려 있는 주소(URL)명에 부합하는 메뉴명이 자동으로 <strong>황동색(Brass) 하이라이팅</strong> 처리됩니다.
      </p>
      
      <!-- 테스트를 위한 가상 랭크 상승용 버튼 -->
      <div class="flex flex-wrap justify-center gap-4">
        <button onclick="simulateSyncProgress()" class="px-5 py-2.5 bg-neonBlue/10 hover:bg-neonBlue text-neonBlue hover:text-white text-xs font-bold font-orbitron border border-neonBlue/40 rounded transition-all">
          SIMULATE SYNC +25%
        </button>
        <button onclick="resetSimulatedProgress()" class="px-5 py-2.5 bg-red-950/20 text-red-400 hover:bg-red-500 hover:text-white text-xs font-bold font-orbitron border border-red-500/30 rounded transition-all">
          RESET PROGRESS
        </button>
      </div>
    </div>
  </main>

  <script>
    /* =================================================================
       공통 네비게이션 동적 제어 스크립트 (모든 페이지 공유)
       ================================================================= */
    
    // 1. 테마 스위처 (다크/라이트)
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      if (isDark) {
        document.body.classList.remove('html-light');
        localStorage.setItem('themeMode', 'dark');
      } else {
        document.body.classList.add('html-light');
        localStorage.setItem('themeMode', 'light');
      }
    }
    
    // 로컬 테마 모드 복원
    if (localStorage.getItem('themeMode') === 'light') {
      document.body.classList.remove('dark');
      document.body.classList.add('html-light');
    }

    // 2. 다국어 설정 인터랙션
    let currentLang = localStorage.getItem('lang') || 'KO';
    function toggleLang() {
      currentLang = currentLang === 'KO' ? 'EN' : 'KO';
      localStorage.setItem('lang', currentLang);
      document.getElementById('langBtnText').textContent = currentLang === 'KO' ? 'EN' : 'KO';
    }
    document.getElementById('langBtnText').textContent = currentLang === 'KO' ? 'EN' : 'KO';

    // 3. 모바일 반응형 햄버거 메뉴 제어
    function toggleMobileMenu() {
      const nav = document.getElementById('navLinks');
      const hud = document.getElementById('hudControls');
      nav.classList.toggle('hidden');
      hud.classList.toggle('hidden');
    }

    // 4. 공용 런타임 현재 페이지 자동 감지 및 스마트 하이라이트
    // (로컬 파일 시스템에서도 매핑 동작하도록 정규식 바인딩 제공)
    function highlightCurrentPage() {
      const items = document.querySelectorAll('.nav-item');
      const path = window.location.pathname;
      const pageName = path.split("/").pop() || 'index.html';

      items.forEach(item => {
        const href = item.getAttribute('href');
        // 예: index.html 과 매칭되거나 최상위 루트인 경우 활성화
        if (pageName === href || (pageName === '' && href === 'index.html')) {
          item.className = "nav-item text-brass font-bold border-b-2 border-brass py-1 relative group transition-all glow-brass";
          // 이펙트 선 제거
          const line = item.querySelector('span');
          if (line) line.className = "hidden";
        }
      });
    }
    highlightCurrentPage();

    // 5. 시뮬레이션 데모용 Sync 계산 스크립트
    let simulatedSync = parseInt(localStorage.getItem('simulatedSync')) || 0;
    function simulateSyncProgress() {
      simulatedSync = Math.min(100, simulatedSync + 25);
      localStorage.setItem('simulatedSync', simulatedSync);
      updateSyncUI();
    }
    function resetSimulatedProgress() {
      simulatedSync = 0;
      localStorage.setItem('simulatedSync', 0);
      updateSyncUI();
    }

    function updateSyncUI() {
      const bar = document.getElementById('syncProgressBar');
      const text = document.getElementById('syncProgressText');
      const rank = document.getElementById('systemRank');
      
      bar.style.width = simulatedSync + '%';
      text.textContent = simulatedSync + '%';

      let activeRank = 'E';
      let colorClass = 'text-slate-800 dark:text-white';
      if (simulatedSync >= 100) { activeRank = 'SSS (MASTER)'; colorClass = 'text-yellow-500 font-extrabold animate-pulse'; }
      else if (simulatedSync >= 75) { activeRank = 'S'; colorClass = 'text-brass font-bold'; }
      else if (simulatedSync >= 50) { activeRank = 'A'; colorClass = 'text-neonBlue font-bold'; }
      else if (simulatedSync >= 25) { activeRank = 'C'; colorClass = 'text-cyan-400'; }

      rank.textContent = activeRank;
      rank.className = `font-orbitron font-bold transition-all duration-300 ${colorClass}`;
    }
    updateSyncUI();

    // 6. 무음 음향 스위치 목업 (본체 페이지에서 완벽 매핑 동작함)
    let soundMuted = true;
    function toggleSound() {
      soundMuted = !soundMuted;
      const soundText = document.getElementById('soundText');
      if (soundMuted) {
        soundText.textContent = "MUTED";
        soundText.className = "font-orbitron font-bold";
      } else {
        soundText.textContent = "SYSTEM ON";
        soundText.className = "font-orbitron font-bold text-brass animate-pulse";
      }
    }
  </script>
</body>
</html>
